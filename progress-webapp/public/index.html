<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trial Progress Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Trial Progress Manager</h1>
        <p>Track generated trials, work-in-progress copies, and per-project docs.</p>
      </div>
      <div class="topbar-right">
        <button id="themeToggle" type="button">Dark Mode: Off</button>
        <div class="summary" id="summary"></div>
      </div>
    </header>

    <main class="layout">
      <section class="left-panel">
        <div class="toolbar">
          <input id="searchInput" type="text" placeholder="Search by project name or number..." />
          <div class="toolbar-controls">
            <button id="resetFiltersBtn" class="secondary-btn" type="button">Clear Filters</button>
          </div>
        </div>

        <div class="filter-panel">
          <div class="filter-section">
            <div class="filter-title">Status</div>
            <div class="filter-options">
              <label><input type="checkbox" data-filter-group="status" value="working-on" /> Working On</label>
              <label><input type="checkbox" data-filter-group="status" value="postponed" /> Postponed</label>
              <label><input type="checkbox" data-filter-group="status" value="done" /> Done</label>
              <label><input type="checkbox" data-filter-group="status" value="not-set" /> Not Set</label>
            </div>
          </div>

          <div class="filter-section">
            <div class="filter-title">Category</div>
            <div class="filter-options">
              <label><input type="checkbox" data-filter-group="category" value="generated" /> Generated</label>
              <label><input type="checkbox" data-filter-group="category" value="python-mini-trials" /> Python MiniTrials</label>
            </div>
          </div>
        </div>

        <div id="projectList" class="project-list"></div>
      </section>

      <section class="right-panel">
        <div id="projectDetail" class="detail-card empty-state">Select a project to view details and markdown docs.</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
